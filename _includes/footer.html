<footer class="footer">
  <div style="text-align: center;">
    <span>{{ site.footerText }}</span>
    <span style="color: #ccc; margin: 0 8px;">|</span>
    <a href="{{ site.baseurl }}/feed.xml">RSS</a>
    <span style="color: #ccc; margin: 0 8px;">|</span>
    <a href="{{ site.baseurl }}/atom.xml">Atom</a>
    <span style="color: #ccc; margin: 0 8px;">|</span>
    <a href="{{ site.baseurl }}/pages/legal.html">声明</a>

    {%- if site.extCount %}
      <span>总访问量</span>
      <span id="busuanzi_value_site_pv"></span>
    {% endif %}
  <p style="color: #767676; margin-top: 12px;">
    Built with ❤
    <span style="color: #767676; font-size: 18px; font-weight: bold; margin: 0 6px;">•</span>
    Commit {{ site.commit_short }}
  </p>
  </div>
  <button type="button" class="footer-btn theme-toggler hide" aria-label="切换夜间模式" aria-pressed="false">
    <i class="svg-icon icon-theme-light" aria-hidden="true"></i>
  </button>
  <button type="button" class="footer-btn to-top" aria-label="回到顶部">
    <i class="svg-icon icon-arrow-top" aria-hidden="true"></i>
  </button>
</footer>
